#updating-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#2563EB;font-weight:600}

#race-tabs-label{font-size:11px;font-weight:700;color:#64748B;margin-bottom:8px;letter-spacing:.5px}

.race-tab-name{margin-bottom:2px}
.race-tab-date{font-size:10px;opacity:.7}

#race-name{font-size:17px;font-weight:700;color:#0F172A}
#race-detail{font-size:12px;color:#64748B}
#race-date{margin-left:auto;font-size:11px;color:#94A3B8}
#winner-bar{margin-top:8px;background:#FFFBEB;border-radius:7px;padding:7px 12px;display:flex;align-items:center;gap:8px;border:1px solid #FDE68A}

.odds-val{font-family:monospace;font-weight:700}
.odds-hot{color:#DC2626}
.odds-warm{color:#D97706}
.odds-cold{color:#94A3B8}

.main-tab{flex:1;padding:10px 0;border-radius:7px;background:transparent;color:#64748B;font-weight:500;font-size:14px;transition:all 0.15s}
.main-tab.active{background:#fff;color:#0F172A;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.08)}

.summary-name{font-size:13px;font-weight:700;color:#0F172A;flex:1}
.summary-count{font-size:12px}

.reveal-btn{padding:7px 16px;border-radius:8px;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.close-btn{background:none;font-size:20px;color:#CBD5E1;padding:0 2px}

#update-info{flex:1;min-width:0}
#update-time{font-size:12px;font-weight:700;color:#1E40AF}
#update-sub{font-size:10px;color:#64748B}
#update-btn{padding:6px 14px;border-radius:8px;background:#2563EB;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}

function nowStr(){
  const d=new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

function renderRaceTabs(){
  const el=document.getElementById('race-tabs');

      ${r.past&&r.winner?`<div class="race-tab-winner">${r.winner}</div>`:''}

function renderRaceInfo(){
  document.getElementById('race-name').textContent=selectedRace.name;
  document.getElementById('race-detail').textContent=`${selectedRace.track} ${selectedRace.distance} ${selectedRace.surface}`;
  document.getElementById('race-date').textContent=`2026年${selectedRace.date}`;

  const el=document.getElementById('content-experts');
  if(!currentHorses.length){el.innerHTML=emptyHTML();return;}

  const results={};
  EXPERTS.forEach(e=>{results[e.id]=e.predict(currentHorses);});
  const pickCount={};
  EXPERTS.forEach(e=>{const p=results[e.id].pick;pickCount[p]=(pickCount[p]||0)+1;});
  const pickRanked=Object.entries(pickCount).sort((a,b)=>b[1]-a[1]);

  const marks=['◎','○','▲'];
  const summaryHTML=pickRanked.map(([name,cnt],i)=>{
    const h=currentHorses.find(x=>x.name===name);
    const pct=Math.round((cnt/EXPERTS.length)*100);
    return `<div style="margin-bottom:10px">
      <div class="summary-bar">
        <span class="summary-mark">${marks[i]||'　'}</span>
        ${h?wakuBadge(h.waku):''}

        <span class="summary-count" style="color:${i===0?'#1D4ED8':'#64748B'};font-weight:${i===0?700:400}">${cnt}/${EXPERTS.length}票</span>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${i===0?'#2563EB':i===1?'#93C5FD':'#CBD5E1'}"></div></div>
    </div>`;
  }).join('');

  const expertCards=EXPERTS.map(e=>{
    const r=results[e.id];
    const isOpen=revealedExperts[e.id];
    const ph=currentHorses.find(h=>h.name===r.pick);
    return `<div class="expert-card" style="border-left:4px solid ${e.color};border:1px solid ${e.border}">
      <div class="expert-header">
        <span class="expert-emoji">${e.emoji}</span>
        <div style="flex:1;min-width:0">
          <div class="expert-name" style="color:${e.color}">${e.name}</div>
          <div class="expert-title">${e.title}</div>
        </div>
        ${isOpen?`
          <div style="text-align:right">
            <div style="font-size:10px;color:#94A3B8;margin-bottom:2px">◎ 本命</div>
            <div style="font-size:14px;font-weight:700;color:${e.color}">${r.pick}</div>
          </div>
          <button class="close-btn" onclick="toggleExpert('${e.id}')">›</button>
        `:`<button class="reveal-btn" style="background:${e.color}" onclick="toggleExpert('${e.id}')">予想を見る</button>`}
      </div>
      ${isOpen?`
        <div class="expert-body">
          <div class="pick-row">
            <div class="pick-box" style="background:${e.bg};border:1px solid ${e.border};flex:1">
              <div class="pick-label" style="color:${e.color}">◎ 本命</div>
              <div class="pick-horse">${ph?wakuBadge(ph.waku):''}${r.pick}</div>
            </div>
            <div class="place-box">
              <div class="place-label">○ 対抗</div>
              <div class="place-names">${r.place.join(' / ')}</div>
            </div>
          </div>
          <div class="comment-box" style="background:${e.bg};border:1px solid ${e.border}">${r.comment}</div>
        </div>`:''}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="card" style="padding:14px 18px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#64748B;margin-bottom:12px">🗳️ ${EXPERTS.length}人の予想屋・本命集計</div>
      ${summaryHTML}
    </div>
    ${expertCards}`;
}

function renderMedia(){
  const el=document.getElementById('content-media');
  if(!currentHorses.length){el.innerHTML=emptyHTML();return;}

  const picks=currentMedia;
  const pickTally={},holeTally={};
  picks.forEach(p=>{pickTally[p.pick]=(pickTally[p.pick]||0)+1;if(p.hole)holeTally[p.hole]=(holeTally[p.hole]||0)+1;});
  const pickRanked=Object.entries(pickTally).sort((a,b)=>b[1]-a[1]);
  const holeRanked=Object.entries(holeTally).sort((a,b)=>b[1]-a[1]);
  const marks=['◎','○','▲'];

  const summaryHTML=pickRanked.map(([name,cnt],i)=>{
    const h=currentHorses.find(x=>x.name===name);
    const pct=Math.round((cnt/picks.length)*100);
    return `<div style="margin-bottom:10px">
      <div class="summary-bar">
        <span class="summary-mark">${marks[i]||'　'}</span>
        ${h?wakuBadge(h.waku):''}

        <span class="summary-count" style="color:${i===0?'#1D4ED8':'#64748B'};font-weight:${i===0?700:400}">${cnt}/${picks.length}媒体</span>

      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${i===0?'#2563EB':i===1?'#93C5FD':'#CBD5E1'}"></div></div>

    <div class="card" style="padding:12px 16px;margin-bottom:10px">

      <div style="display:flex;gap:6px;flex-wrap:wrap">

            <span style="font-size:11px;color:#94A3B8">${cnt}票</span>

    </div>`:'';

  const mediaCards=picks.map((p,i)=>{
    const ph=currentHorses.find(h=>h.name===p.pick);
    const isOpen=expandedMedia===i;
    return `<div class="media-card">
      <div class="media-header" onclick="toggleMedia(${i})">
        <span class="media-icon">${p.icon||'📰'}</span>
        <span class="media-name">${p.media}</span>
        <div class="media-pick-inline">
          ${ph?wakuBadge(ph.waku):''}
          <span class="media-pick-name">◎ ${p.pick}</span>
        </div>
        <span class="media-chevron" style="transform:${isOpen?'rotate(90deg)':'rotate(0deg)'}">›</span>
      </div>
      ${isOpen?`
        <div class="media-body">
          <div class="pick-row">
            <div class="pick-box" style="background:#FFFBEB;border:1px solid #FDE68A;flex:1">
              <div class="pick-label" style="color:#92400E">◎ 本命</div>
              <div class="pick-horse">${ph?wakuBadge(ph.waku):''}${p.pick}</div>
            </div>
            <div class="place-box" style="background:#EFF6FF;border:1px solid #BFDBFE">
              <div class="place-label" style="color:#1E40AF">○ 対抗</div>
              <div class="place-names" style="color:#1E3A8A">${(p.place||[]).join(' / ')}</div>
            </div>
            ${p.hole?`<div class="hole-box"><div class="hole-label">💥 穴</div><div class="hole-name">${p.hole}</div></div>`:''}
          </div>
          <div class="note-box">${p.note}</div>
        </div>`:''}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div id="update-banner">
      <div id="update-info">
        <div id="update-time">最終更新: ${updatedAt}</div>
      </div>
      <button id="update-btn" onclick="handleRefresh()">🔄 今すぐ更新</button>
    </div>
    <div class="card" style="padding:14px 18px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:#64748B;margin-bottom:12px">📊 ${picks.length}媒体の本命集計</div>
      ${summaryHTML}
    </div>
    ${holeHTML}
    ${mediaCards}`;
}

function emptyHTML(){
  return `<div class="empty"><div class="empty-icon">🏇</div><div class="empty-text">出馬表発表後に予想・分析が使えます</div></div>`;
}

function render(){
  renderRaceTabs();
  renderRaceInfo();
  if(currentTab==='experts') renderExperts();
  else renderMedia();
}

// ─── イベント ─────────────────────────────────────────────────
function selectRace(id){
  selectedRace=RACES.find(r=>r.id===id);
  currentHorses=[...(selectedRace.horses||[])];
  currentMedia=[...(selectedRace.media||[])];
  revealedExperts={};
  expandedMedia=null;
  currentTab='experts';
  document.getElementById('tab-experts').classList.add('active');
  document.getElementById('tab-media').classList.remove('active');
  document.getElementById('content-experts').style.display='';
  document.getElementById('content-media').style.display='none';
  render();
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-experts').classList.toggle('active',tab==='experts');
  document.getElementById('tab-media').classList.toggle('active',tab==='media');
  document.getElementById('content-experts').style.display=tab==='experts'?'':'none';
  document.getElementById('content-media').style.display=tab==='media'?'':'none';
  render();
}

function toggleExpert(id){
  revealedExperts[id]=!revealedExperts[id];
  renderExperts();
}

function toggleMedia(i){
  expandedMedia=expandedMedia===i?null:i;
  renderMedia();
}

function handleRefresh(){
  if(apiKey){ doUpdate(apiKey); }
  else { openModal(); }
}

  const saved=apiKey;
  document.getElementById('api-input').value=saved;
  document.getElementById('api-saved').style.display=saved?'block':'none';
  document.getElementById('api-modal-bg').style.display='flex';
}

function closeModal(){
  document.getElementById('api-modal-bg').style.display='none';
}

function submitApiKey(){
  const key=document.getElementById('api-input').value.trim();
  if(!key) return;
  closeModal();
  doUpdate(key);
}

async function doUpdate(key){
  apiKey=key;
  try{ localStorage.setItem('pplx_api_key',key); }catch{}
  document.getElementById('updating-indicator').style.display='flex';
  document.getElementById('error-bar').style.display='none';

  const d=new Date();
  const dateStr=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const prompt=`${dateStr}時点の「${selectedRace.name}2026」について以下をJSONのみで返してください。\n{"odds":[{"name":"馬名","odds":数値}],"media":[{"media":"媒体名","icon":"絵文字","pick":"本命馬名","place":["対抗1","対抗2"],"hole":"穴馬名","note":"予想理由80字以内"}]}\noddsは全出走馬の最新単勝オッズ。mediaは主要競馬メディアの予想を10件以上。`;

  try{
    const res=await fetch('https://api.perplexity.ai/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${key}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'sonar-pro',
        messages:[
          {role:'system',content:'競馬情報の収集専門家です。JSONのみ返してください。'},
          {role:'user',content:prompt}
        ],
        temperature:0.1
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const raw=data.choices?.[0]?.message?.content||'';
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(parsed.odds?.length){
      currentHorses=currentHorses.map(h=>{const f=parsed.odds.find(o=>o.name===h.name);return f?{...h,odds:f.odds}:h;});
    }
    if(parsed.media?.length){ currentMedia=parsed.media; }
    updatedAt=nowStr();
  }catch(e){
    showError(`更新失敗: ${e.message}`);
  }
  document.getElementById('updating-indicator').style.display='none';
  render();
}

// ─── 初期化 ───────────────────────────────────────────────────
render();
</script>
